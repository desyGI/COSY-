    body {

      box-shadow: 0 4px 12px rgba(138, 79, 255, 0.3);
    }

    .birthday-banner span {

      font-size: 2.2rem;
      margin-top: 0.3rem;
    }

    .birthday-banner .small {
      font-size: 1rem;
      font-weight: 400;
      margin-top: 0.5rem;
      opacity: 0.9;
    }

    .nav-menu {
      background: white;
      padding: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(138, 79, 255, 0.1);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      border-bottom: 2px solid #f0eaff;
    }

    .nav-item {
      background: none;
      border: 2px solid #8a4fff;
      color: #8a4fff;
      padding: 0.5rem 1rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-item:hover {
      background: #8a4fff;
      color: white;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo {
      font-size: 3.5rem;
      font-weight: 700;
      color: #8a4fff;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 0 #ffd6a8;
    }

    .subhead {
      font-size: 1rem;
      color: #4a4a5e;
      text-align: center;
      max-width: 700px;
      background: #ffffffd9;
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
    }

    .category-section {
      scroll-margin-top: 70px;
      margin-bottom: 3rem;
    }

    .category-title {
      font-size: 2rem;
      color: #1e1e2f;
      margin: 1.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 3px solid #8a4fff;
      display: inline-block;
    }

    .subcategory-title {
      font-size: 1.5rem;
      color: #4a4a5e;
      margin: 1.5rem 0 1rem;
      padding-left: 0.5rem;
      border-left: 4px solid #8a4fff;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      margin: 1rem 0;
    }

    .product-card {
      background: white;
      border-radius: 24px;
      padding: 1rem 0.8rem 1.2rem;
      box-shadow: 0 8px 16px -8px rgba(138, 79, 255, 0.08);
      transition: all 0.2s ease;
      border: 1px solid #f0eaff;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 24px -8px rgba(138, 79, 255, 0.2);
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f0eaff;
      border-radius: 20px;
      margin-bottom: 0.8rem;
      overflow: hidden;
      border: 2px solid white;
      box-shadow: 0 4px 0 #8a4fff20;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      color: #1e1e2f;
    }

    .product-category {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8a4fff;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    .price-box {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 0.3rem 0;
    }

    .old-price {
      font-size: 0.9rem;
      color: #a0a0b0;
      text-decoration: line-through;
    }

    .new-price {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1e1e2f;
    }

    .new-price small {
      font-size: 0.8rem;
      font-weight: 400;
      color: #6b6b7e;
    }

    .discount-badge {
      background: #ff6b6b;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 0.5rem;
      align-self: flex-start;
    }

    .view-more-btn {
      background: none;
      border: 2px solid #8a4fff;
      color: #8a4fff;
      padding: 0.6rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      margin: 1rem auto 0;
      display: block;
    }

      background: #8a4fff;
      color: white;
    }

    .footer-note {
      text-align: center;
      font-size: 0.9rem;
      color: #a0a0b0;
      margin-top: 3rem;
      padding: 1rem 0;
      border-top: 1px solid #e0d0ff;
    }

    @media (max-width: 600px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }

        justify-content: flex-start;
        overflow-x: auto;
        padding: 0.8rem;

    // STRUCTURE DES CATÉGORIES - CORRIGÉE !
    // ------------------------------------------------------------
    const categoryStructure = [
      { name: "Collier Homme", type: "main" },
      { name: "Collier Femme", type: "main" },
      { name: "Bracelet", type: "main" },
      { name: "Parure", type: "main" },
      { name: "Baya", type: "main" },
      { name: "Chevillère", type: "main" },
      { 
        name: "Autres accessoires", 
        type: "parent",
        subcategories: [
          "Accessoire Sac",
          "Accessoire Pantalon",
          "Accessoire Téléphone",
          "Accessoire Épaule",
          "Accessoire Dos"
        ]
      },
      { name: "Accessoire Personnalisé", type: "main", highlight: true }
    ];

    // ------------------------------------------------------------
    // FONCTIONS
    // ------------------------------------------------------------
    
    // Générer le menu de navigation
    function generateNavMenu() {
      const navMenu = document.getElementById('navMenu');
      let navHtml = '';
      
      categoryStructure.forEach(cat => {
        if (cat.type === 'main') {
          navHtml += `<a href="#${cat.name.replace(/\s+/g, '-')}" class="nav-item">${cat.name}</a>`;
        } else if (cat.type === 'parent') {
          navHtml += `<a href="#${cat.name.replace(/\s+/g, '-')}" class="nav-item">${cat.name}</a>`;
        }
      });
      
      navMenu.innerHTML = navHtml;
    }

    // Fonction pour créer une carte produit
    function createProductCard(product) {
      const discountedPrice = product.price * (1 - DISCOUNT);
      const usdPrice = (discountedPrice * TND_TO_USD).toFixed(2);
      
      return `
        <div class="product-card">
          <div class="discount-badge">-20%</div>
          <div class="product-image">
            <img src="${product.image}" alt="${product.name}" loading="lazy">
          </div>
          <div class="product-name">${product.name}</div>
          <div class="product-category">${product.cat}</div>
          <div class="price-box">
            <span class="old-price">${product.price.toFixed(2)} TND</span>
            <span class="new-price">
              ${discountedPrice.toFixed(2)} TND
              <small>(${usdPrice} USD)</small>
            </span>
          </div>
        </div>
      `;
    }

    // Fonction pour afficher les produits
    function renderProducts(containerId, productsList, itemsPerPage = 8) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      let currentPage = 1;
      
      function displayProducts() {
        const end = currentPage * itemsPerPage;
        const productsToShow = productsList.slice(0, end);
        
        let html = '<div class="product-grid">';
        productsToShow.forEach(product => {
          html += createProductCard(product);
        });
        html += '</div>';
        
        if (end < productsList.length) {
          html += `<button class="view-more-btn" onclick="loadMoreProducts('${containerId}', ${itemsPerPage})">Voir plus (${productsList.length - end} restants)</button>`;
        }
        
        container.innerHTML = html;
      }
      
      displayProducts();
      window[`page_${containerId}`] = currentPage;
    }

    // Fonction pour charger plus de produits
    window.loadMoreProducts = function(containerId, itemsPerPage) {
      const currentPage = window[`page_${containerId}`] || 1;
      window[`page_${containerId}`] = currentPage + 1;
      
      const container = document.getElementById(containerId);
      if (!container) return;
      
      const catName = containerId.replace('container-', '').replace(/-/g, ' ');
      let filteredProducts;
      
      if (catName === 'Collier Homme' || catName === 'Collier Femme' || 
          catName === 'Bracelet' || catName === 'Parure' || 
          catName === 'Baya' || catName === 'Chevillère' || 
          catName === 'Accessoire Personnalisé') {
        filteredProducts = products.filter(p => p.cat === catName);
      } else {
        filteredProducts = products.filter(p => p.cat === catName);
      }
      
      const end = window[`page_${containerId}`] * itemsPerPage;
      const productsToShow = filteredProducts.slice(0, end);
      
      let html = '<div class="product-grid">';
      productsToShow.forEach(product => {
        html += createProductCard(product);
      });
      html += '</div>';
      
      if (end < filteredProducts.length) {
        html += `<button class="view-more-btn" onclick="loadMoreProducts('${containerId}', ${itemsPerPage})">Voir plus (${filteredProducts.length - end} restants)</button>`;
      }
      
      container.innerHTML = html;
    };

    // Générer toutes les sections
    function generateSections() {
      const container = document.getElementById('sections-container');
      let html = '';
      
      categoryStructure.forEach(cat => {
        if (cat.type === 'main') {
          const catProducts = products.filter(p => p.cat === cat.name);
          if (catProducts.length > 0) {
            const highlightClass = cat.highlight ? ' style="background: #fff0e6; padding: 1rem; border-radius: 24px;"' : '';
            html += `<div id="${cat.name.replace(/\s+/g, '-')}" class="category-section"${highlightClass}>`;
            html += `<h2 class="category-title">${cat.name}</h2>`;
            html += `<div id="container-${cat.name.replace(/\s+/g, '-')}"></div>`;
            html += `</div>`;
          }
        } else if (cat.type === 'parent') {
          html += `<div id="${cat.name.replace(/\s+/g, '-')}" class="category-section">`;
          html += `<h2 class="category-title">${cat.name}</h2>`;
          
          cat.subcategories.forEach(subcat => {
            const subcatProducts = products.filter(p => p.cat === subcat);
            if (subcatProducts.length > 0) {
              html += `<h3 class="subcategory-title">${subcat}</h3>`;
              html += `<div id="container-${subcat.replace(/\s+/g, '-')}"></div>`;
            }
          });
          
          html += `</div>`;
        }
      });
      
      container.innerHTML = html;
      
      // Remplir chaque conteneur avec les produits
      categoryStructure.forEach(cat => {
        if (cat.type === 'main') {
          const catProducts = products.filter(p => p.cat === cat.name);
          if (catProducts.length > 0) {
            renderProducts(`container-${cat.name.replace(/\s+/g, '-')}`, catProducts);
          }
        } else if (cat.type === 'parent') {
          cat.subcategories.forEach(subcat => {
            const subcatProducts = products.filter(p => p.cat === subcat);
            if (subcatProducts.length > 0) {
              renderProducts(`container-${subcat.replace(/\s+/g, '-')}`, subcatProducts);
            }
          });
        }
      });
    }

    // Initialiser la page
    generateNavMenu();
    generateSections();
  </script>
</body>
</html>
